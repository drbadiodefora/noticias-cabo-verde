name: Coletor diário de notícias

on:
  schedule:
    - cron: '0 6 * * *'
      timezone: "Atlantic/Cape_Verde"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install feedparser

      - name: Coletar notícias
        run: python news_collector.py

      - name: Enviar e‑mail com a Action especializada
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: file://email_subject.txt
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: file://email_content.html
          content_type: text/html
          secure: true

      - name: Guardar estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_news_run.txt email_content.html email_subject.txt
          git commit -m "Atualizar verificação [skip ci]" || true
          git push
